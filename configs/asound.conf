# Luwu OS — ALSA dmix + dsnoop 配置
# 允许多个 App 同时播放/录音，WM8960 (card 0, device 0)
# plug 插件自动做采样率/通道转换

pcm.!default {
    type asym
    playback.pcm "dmixer"
    capture.pcm  "dsnooper"
}

# 软件混音 — 多个播放 App 共存
pcm.dmixer {
    type plug
    slave.pcm {
        type dmix
        ipc_key 1024
        slave {
            pcm "hw:0,0"
            period_time 0
            period_size 1024
            buffer_size 4096
            rate 44100
            channels 2
        }
        bindings {
            0 0
            1 1
        }
    }
}

# 软件共享录音 — 多个录音 App 共存
pcm.dsnooper {
    type plug
    slave.pcm {
        type dsnoop
        ipc_key 2048
        slave {
            pcm "hw:0,0"
            period_time 0
            period_size 1024
            buffer_size 4096
            rate 44100
            channels 2
        }
        bindings {
            0 0
            1 1
        }
    }
}

# 直接访问硬件（保留，供需要低延迟的 App 使用）
pcm.hw_direct {
    type hw
    card 0
    device 0
}
